name: Migrations - staging

# Pousse les migrations Supabase sur le projet staging quand un changement
# touche supabase/migrations/** sur la branche staging.
#
# Pre-requis (cf. docs/CICD.md):
#   - GitHub Environment `staging` configure avec les secrets:
#       SUPABASE_ACCESS_TOKEN
#       SUPABASE_STAGING_PROJECT_REF
#       SUPABASE_STAGING_DB_PASSWORD

on:
  push:
    branches: [staging]
    paths:
      - "supabase/migrations/**"
      - "supabase/config.toml"
      - ".github/workflows/migrations-staging.yml"
  workflow_dispatch:

concurrency:
  group: migrations-staging
  cancel-in-progress: false

jobs:
  push:
    name: supabase db push (staging)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_STAGING_PROJECT_REF: ${{ secrets.SUPABASE_STAGING_PROJECT_REF }}
          SUPABASE_STAGING_DB_PASSWORD: ${{ secrets.SUPABASE_STAGING_DB_PASSWORD }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_STAGING_PROJECT_REF" ] || [ -z "$SUPABASE_STAGING_DB_PASSWORD" ]; then
            echo "::error::Missing one of SUPABASE_ACCESS_TOKEN / SUPABASE_STAGING_PROJECT_REF / SUPABASE_STAGING_DB_PASSWORD"
            exit 1
          fi

      - name: Link project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_STAGING_DB_PASSWORD }}
        run: supabase link --project-ref "${{ secrets.SUPABASE_STAGING_PROJECT_REF }}"

      - name: Diff (informational)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_STAGING_DB_PASSWORD }}
        run: supabase db diff --linked || true

      - name: Push migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_STAGING_DB_PASSWORD }}
        run: supabase db push --include-all
