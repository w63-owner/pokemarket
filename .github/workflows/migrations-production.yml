name: Migrations - production

# Pousse les migrations Supabase sur le projet PROD quand un changement
# touche supabase/migrations/** sur la branche main.
#
# IMPORTANT: ce job tourne dans l'environnement GitHub `production`,
# qui DOIT etre configure avec un required reviewer (Settings > Environments).
# Le job sera mis en pause jusqu'a ton approbation manuelle.
#
# Pre-requis (cf. docs/CICD.md):
#   - GitHub Environment `production` configure avec required reviewers ET les secrets:
#       SUPABASE_ACCESS_TOKEN
#       SUPABASE_PROD_PROJECT_REF
#       SUPABASE_PROD_DB_PASSWORD

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - "supabase/config.toml"
      - ".github/workflows/migrations-production.yml"
  workflow_dispatch:

concurrency:
  group: migrations-production
  cancel-in-progress: false

jobs:
  push:
    name: supabase db push (production)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: production
      url: ${{ secrets.PROD_APP_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Validate secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROD_PROJECT_REF: ${{ secrets.SUPABASE_PROD_PROJECT_REF }}
          SUPABASE_PROD_DB_PASSWORD: ${{ secrets.SUPABASE_PROD_DB_PASSWORD }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROD_PROJECT_REF" ] || [ -z "$SUPABASE_PROD_DB_PASSWORD" ]; then
            echo "::error::Missing one of SUPABASE_ACCESS_TOKEN / SUPABASE_PROD_PROJECT_REF / SUPABASE_PROD_DB_PASSWORD"
            exit 1
          fi

      - name: Link project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_PROD_DB_PASSWORD }}
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROD_PROJECT_REF }}"

      - name: Diff (informational, must be empty after push)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_PROD_DB_PASSWORD }}
        run: |
          echo "=== Diff against current prod schema BEFORE push ==="
          supabase db diff --linked || true

      - name: Push migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_PROD_DB_PASSWORD }}
        run: supabase db push --include-all

      - name: Verify no drift
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_PROD_DB_PASSWORD }}
        run: |
          echo "=== Diff after push (should be empty) ==="
          DIFF=$(supabase db diff --linked || true)
          if [ -n "$DIFF" ]; then
            echo "::warning::Schema drift detected after push:"
            echo "$DIFF"
          else
            echo "OK: prod schema matches migrations."
          fi
