name: Mobile - EAS build & submit

# Trigger:
#   - Push a tag matching mobile-vX.Y.Z to start a production build for both
#     platforms and (optionally) submit them to TestFlight + Play internal track.
#   - workflow_dispatch lets you do dry-runs against the preview profile.
#
# Required GitHub secrets (Settings -> Environments -> mobile-production):
#   EXPO_TOKEN                 (from https://expo.dev/accounts/<owner>/settings/access-tokens)
#
# Required EAS secrets (created with `eas secret:create` once per project):
#   SENTRY_AUTH_TOKEN           (required for production native builds — NOT forwarded from GH Actions)
#   SENTRY_ORG                  (optional if set in eas.json production env)
#   SENTRY_PROJECT              (optional if set in eas.json production env)
#   APPLE_APP_SPECIFIC_PASSWORD (used by `eas submit --platform ios`)
#   GOOGLE_SERVICE_ACCOUNT      (used by `eas submit --platform android`)
#
# How to release:
#   1. bump apps/mobile/app.json version + buildNumber + versionCode
#   2. update apps/mobile/store/release-notes/<version>-{fr,en}.txt
#   3. git tag mobile-v1.0.0 && git push --tags
#   4. (optional) `gh workflow run mobile-release.yml -f profile=preview`
#      to test the build pipeline without consuming a production build slot.

on:
  push:
    tags:
      - "mobile-v*"
  workflow_dispatch:
    inputs:
      profile:
        description: "EAS profile (preview = no submit, production = submit to stores)"
        required: true
        default: "preview"
        type: choice
        options:
          - preview
          - production
      submit:
        description: "Submit binaries to App Store Connect / Play Console"
        required: true
        default: false
        type: boolean

concurrency:
  group: mobile-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-submit:
    name: EAS build (${{ github.event.inputs.profile || 'production' }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment:
      name: mobile-production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies (root + workspaces)
        run: npm ci

      - name: Setup Expo + EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Resolve EAS profile
        id: profile
        run: |
          PROFILE="${{ github.event.inputs.profile || 'production' }}"
          echo "profile=$PROFILE" >> "$GITHUB_OUTPUT"
          echo "Resolved profile: $PROFILE"

      # Sourcemap upload happens on the EAS builder (apps/mobile/eas-hooks/
      # eas-build-on-success.sh) which needs SENTRY_AUTH_TOKEN / SENTRY_ORG /
      # SENTRY_PROJECT as project-scoped env vars. The CLI lists them with
      # `eas env:list production --format short`, which emits `KEY=*****`
      # one per line for both the new env system AND legacy `eas secret:*`
      # entries. Fail-fast here so a missing var is caught at workflow
      # start — not 30 min later after the native build.
      - name: Verify Sentry sourcemap secrets on EAS (production)
        if: steps.profile.outputs.profile == 'production'
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          set -euo pipefail
          echo "Checking that SENTRY_AUTH_TOKEN, SENTRY_ORG, SENTRY_PROJECT are configured as EAS env vars (production)…"
          ENV_LIST="$(eas env:list production --format short)"
          for KEY in SENTRY_AUTH_TOKEN SENTRY_ORG SENTRY_PROJECT; do
            if ! echo "$ENV_LIST" | grep -qE "^${KEY}="; then
              echo "::error::EAS env var \"$KEY\" is missing for the production environment. Run: eas env:create production --name $KEY --value <value> --visibility secret"
              echo "Sourcemap upload would silently no-op (see apps/mobile/eas-hooks/eas-build-on-success.sh)."
              exit 1
            fi
          done
          echo "All Sentry sourcemap env vars present."

      # SENTRY_* in this job env are NOT sent to EAS cloud builders — configure
      # them as EAS project secrets (`eas secret:create`) for production builds.
      - name: Trigger EAS build (iOS + Android)
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build \
            --profile "${{ steps.profile.outputs.profile }}" \
            --platform all \
            --non-interactive \
            --no-wait

      - name: Push App Store Connect metadata
        if: steps.profile.outputs.profile == 'production'
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas metadata:push --profile production --non-interactive

      # Submit is a one-way trip to TestFlight / Play Console — bail
      # out loudly if `ascAppId` is still the placeholder. EAS would
      # otherwise fail with an opaque "could not resolve app" error
      # several minutes into the iOS submit.
      - name: Assert eas.json submit config is wired
        if: |
          steps.profile.outputs.profile == 'production' &&
          (github.event_name == 'push' || github.event.inputs.submit == 'true')
        run: |
          set -euo pipefail
          ASC_APP_ID="$(node -e "console.log(require('./apps/mobile/eas.json').submit.production.ios.ascAppId)")"
          if [ "$ASC_APP_ID" = "TODO_APP_STORE_CONNECT_ID" ] || [ -z "$ASC_APP_ID" ]; then
            echo "::error::eas.json submit.production.ios.ascAppId is unset. Get the numeric App ID from https://appstoreconnect.apple.com → App Information → Apple ID."
            exit 1
          fi

      - name: Submit to stores (when requested)
        if: |
          steps.profile.outputs.profile == 'production' &&
          (github.event_name == 'push' || github.event.inputs.submit == 'true')
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas submit --platform ios --profile production --latest --non-interactive
          eas submit --platform android --profile production --latest --non-interactive

      - name: Summary
        if: always()
        run: |
          echo "## Mobile release run" >> "$GITHUB_STEP_SUMMARY"
          echo "- profile: \`${{ steps.profile.outputs.profile }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- ref: \`${{ github.ref }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- builds queued asynchronously on EAS — follow at https://expo.dev" >> "$GITHUB_STEP_SUMMARY"
