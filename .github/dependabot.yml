version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 10
    target-branch: staging
    versioning-strategy: increase
    labels:
      - dependencies
      - npm
    groups:
      next:
        patterns:
          - "next"
          - "@next/*"
          - "eslint-config-next"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      supabase:
        patterns:
          - "@supabase/*"
          - "supabase"
      stripe:
        patterns:
          - "stripe"
          - "@stripe/*"
      sentry:
        patterns:
          - "@sentry/*"
      tanstack:
        patterns:
          - "@tanstack/*"
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "@playwright/*"
          - "@testing-library/*"
          - "jsdom"
      lint-format:
        patterns:
          - "eslint"
          - "eslint-*"
          - "prettier"
          - "prettier-*"
          - "husky"
          - "lint-staged"
      types:
        patterns:
          - "@types/*"
        exclude-patterns:
          - "@types/react"
          - "@types/react-dom"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 5
    target-branch: staging
    labels:
      - dependencies
      - github-actions
