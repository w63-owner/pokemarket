<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Hors ligne — PokeMarket</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          sans-serif;
        background: #f8f9fa;
        color: #1a1a2e;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
        padding: 24px;
      }
      .container {
        text-align: center;
        max-width: 400px;
      }
      .icon {
        font-size: 64px;
        margin-bottom: 24px;
      }
      h1 {
        font-size: 24px;
        font-weight: 700;
        margin-bottom: 12px;
      }
      p {
        color: #6b7280;
        font-size: 16px;
        line-height: 1.5;
        margin-bottom: 32px;
      }
      button {
        background: #e63946;
        color: #fff;
        border: none;
        border-radius: 12px;
        padding: 14px 32px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: background 200ms;
      }
      button:hover {
        background: #c42d38;
      }
      button:active {
        transform: translateY(1px);
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #0f0f1a;
          color: #f1f3f5;
        }
        p {
          color: #9ca3af;
        }
        button {
          background: #ff4d5a;
        }
        button:hover {
          background: #e63946;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">📡</div>
      <h1>Vous êtes hors ligne</h1>
      <p>
        Vérifiez votre connexion internet et réessayez. Vos données seront
        synchronisées dès que vous serez reconnecté.
      </p>
      <button onclick="location.reload()">Recharger la page</button>
    </div>
  </body>
</html>
